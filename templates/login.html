<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Automower BLE — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <style>
    body {
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url('/static/logo.jpeg') center center / 55vh auto no-repeat;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }
    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 20px rgba(0,0,0,.12);
      border: none;
      border-radius: 16px;
    }
    .login-card .card-header {
      border-radius: 16px 16px 0 0 !important;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: .3px;
    }
  </style>
</head>
<body>
  <div class="card login-card">
    <div class="card-header bg-success text-white text-center py-3">
      <i class="bi bi-robot me-2"></i>Automower BLE Control
    </div>
    <div class="card-body p-4">
      <h6 class="text-muted mb-3 text-center">Sign in to continue</h6>

      {% if error %}
      <div class="alert alert-danger py-2 d-flex align-items-center gap-2" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form method="post" action="/login" autocomplete="on">
        <div class="mb-3">
          <label for="password" class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input
              id="password"
              name="password"
              type="password"
              class="form-control"
              placeholder="Enter password"
              autocomplete="current-password"
              required
              autofocus
            />
          </div>
        </div>
        <button type="submit" class="btn btn-success w-100 mt-1">
          <i class="bi bi-box-arrow-in-right me-1"></i>Sign in
        </button>
      </form>
    </div>
  </div>
</body>
</html>
